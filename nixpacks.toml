# Coolify / Nixpacks: avoid empty bash -c steps by pinning install, build, and start.
# See: https://github.com/coollabsio/coolify/issues/2579
#
# Do not use `corepack prepare pnpm` here: Node's Corepack in the Nixpacks image can fail with
# "Cannot find matching keyid" (signature verify). Installing pnpm via npm avoids that.

providers = ["node"]

[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.install]
cmds = [
  "npm install -g pnpm@10.33.0",
  "pnpm install --frozen-lockfile",
]

[phases.build]
cmds = ["pnpm run build"]

[start]
cmd = "pnpm run start"
